  <link rel="icon" href="photos/optimized/profile_2026_560.jpg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>

  <!-- ═══ NAVIGATION ═══ -->
  <nav class="nav is-away" id="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo" aria-label="Jie Lou home">
        <span class="logo-full">Jie Lou</span>
        <span class="logo-short">JL</span>
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html#home">Home</a></li>
        <li><a href="index.html#lab">Lab</a></li>
        <li><a href="index.html#field">Work</a></li>
        <li><a href="index.html#proof">GTC</a></li>
        <li><a href="index.html#off-grid">Travel</a></li>
        <li><a href="mailto:jlou1@alumni.cmu.edu" class="nav-cta">Contact</a></li>
      </ul>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-controls="navLinks" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- ═══ GALLERY ═══ -->
  <main id="main" class="gallery-page section" data-theme="sky">
    <div class="container">
      <div class="section-header reveal">
        <span class="section-label">// Adventures</span>
        <h1 class="section-title">Travel Gallery</h1>
      </div>
      <p class="section-desc reveal">Places explored, moments captured.</p>

      <div class="gallery-grid reveal">
        <figure class="gallery-item">
          <img src="photos/optimized/travel_dsc09786_760.jpg" data-full="photos/travelling/DSC09786.jpg" alt="Alaska train at blue hour" loading="lazy" decoding="async">
          <figcaption>Alaska rail</figcaption>
        </figure>
        <figure class="gallery-item">
          <img src="photos/optimized/travel_img9056_760.jpg" data-full="photos/travelling/IMG_9056.jpg" alt="Ice wall texture captured while traveling" loading="lazy" decoding="async">
          <figcaption>Ice texture</figcaption>
        </figure>
        <figure class="gallery-item">
          <img src="photos/optimized/travel_img9424_760.jpg" data-full="photos/travelling/IMG_9424.JPG" alt="Coastal travel landscape" loading="lazy" decoding="async">
          <figcaption>Between stops</figcaption>
        </figure>
        <figure class="gallery-item">
          <img src="photos/optimized/travel_img9639_760.jpg" data-full="photos/travelling/IMG_9639.jpg" alt="Travel moment outdoors" loading="lazy" decoding="async">
          <figcaption>Small detours</figcaption>
        </figure>
      </div>

      <!-- Add more photos above as you travel. Copy a .gallery-item block. -->

      <div style="text-align:center; margin-top:3rem">
        <a href="index.html" class="btn btn-ghost">← Back to Home</a>
      </div>
    </div>
  </main>

  <!-- ═══ LIGHTBOX ═══ -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Travel photo preview">
    <button class="lightbox-close" id="lightboxClose" aria-label="Close">&#x2715;</button>
    <img id="lightboxImg" src="" alt="">
  </div>

  <!-- ═══ FOOTER ═══ -->
  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-name">Jie Lou</div>
        <div class="footer-links">
          <a href="https://www.linkedin.com/in/jielou" target="_blank" rel="noopener">LinkedIn ↗</a>
          <a href="mailto:jlou1@alumni.cmu.edu">jlou1@alumni.cmu.edu</a>
        </div>
        <div class="footer-copy">&copy; 2026 Jie Lou</div>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
